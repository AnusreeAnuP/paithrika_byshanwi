{% extends 'base.html' %}
{% load static %}

{% block title %}Login{% endblock %}

{% block content %}
<section class="py-5 bg-white" style="min-height: 70vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-sm border-0 mt-5">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4" style="color: var(--primary-color);">Welcome Back</h2>
                        <form method="POST">
                            {% csrf_token %}
                            
                            {% if form.errors %}
                            <div class="alert alert-danger p-2 mb-3">
                                <small>Invalid username or password.</small>
                            </div>
                            {% endif %}
                            
                            <div class="mb-3">
                                <label class="form-label text-muted">Username</label>
                                <input type="text" name="username" class="form-control form-control-lg" required>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label text-muted">Password</label>
                                <input type="password" name="password" class="form-control form-control-lg" required>
                            </div>
                            
                            <button type="submit" class="btn btn-primary-custom w-100 py-2 mb-3">Login</button>
                            
                            <div class="text-center">
                                <p class="text-muted mb-0">Don't have an account? <a href="{% url 'accounts:register' %}" style="color: var(--secondary-color); font-weight: 500;">Register here</a></p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
